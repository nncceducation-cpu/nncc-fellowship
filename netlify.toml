# Netlify configuration for a static site.
# Safe to leave as-is; Netlify serves the files in this folder directly.

[build]
  publish = "."

# Sensible security headers for a static site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
